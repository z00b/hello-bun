version: 2.1

jobs:
  release:
    docker:
      # Use an image with both Bun and GoReleaser
      - image: cimg/base:stable

    resource_class: medium

    steps:
      - checkout

      - run:
          name: Fetch all tags
          command: |
            git fetch --force --tags
            git fetch --force --prune --tags

      - run:
          name: Install Bun
          command: |
            curl -fsSL https://bun.sh/install | bash
            echo 'export BUN_INSTALL="$HOME/.bun"' > ~/.bunenv
            echo 'export PATH="$BUN_INSTALL/bin:$PATH"' >> ~/.bunenv
            source ~/.bunenv

      - run:
          name: Verify Bun installation
          command: |
            source ~/.bunenv
            bun --version

      - run:
          name: Install dependencies
          command: |
            source ~/.bunenv
            bun install

      - run:
          name: Install Nix
          command: |
            # Install Nix package manager (for nix-prefetch-url)
            sh <(curl -L https://nixos.org/nix/install) --no-daemon
            source ~/.nix-profile/etc/profile.d/nix.sh
            nix --version

      - run:
          name: Install GoReleaser
          command: |
            # Download and install GoReleaser
            curl -sL https://github.com/goreleaser/goreleaser/releases/download/v2.6.1/goreleaser_Linux_x86_64.tar.gz | sudo tar -xz -C /usr/local/bin goreleaser
            goreleaser --version

      - run:
          name: Check token
          command: |
            if [ -z "${GITHUB_TOKEN}" ]; then echo "TOKEN IS MISSING"; else echo "Token starts with: ${GITHUB_TOKEN: -4}"; fi

      - run:
          name: Run GoReleaser
          command: |
            source ~/.bunenv
            source ~/.nix-profile/etc/profile.d/nix.sh
            goreleaser release --clean

workflows:
  version: 2
  release:
    jobs:
      - release:
          context: z00b-releaser
          # Only run on tag pushes
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
