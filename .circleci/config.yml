version: 2.1

orbs:
  flox: flox/orb@1.0.0

jobs:
  release:
    docker:
      # Use an image with both Bun and GoReleaser
      - image: cimg/base:stable

    resource_class: medium

    steps:
      - checkout

      - run:
          name: Fetch all tags
          command: |
            git fetch --force --tags
            git fetch --force --prune --tags

      - run:
          name: Install Bun
          command: |
            curl -fsSL https://bun.sh/install | bash
            echo 'export BUN_INSTALL="$HOME/.bun"' > ~/.bunenv
            echo 'export PATH="$BUN_INSTALL/bin:$PATH"' >> ~/.bunenv
            source ~/.bunenv

      - run:
          name: Verify Bun installation
          command: |
            source ~/.bunenv
            bun --version

      - run:
          name: Install dependencies
          command: |
            source ~/.bunenv
            bun install

      - flox/install

      - run: rm -f flox.*.deb

      - run:
          name: Install GoReleaser
          command: |
            # Download and install GoReleaser
            curl -sL https://github.com/goreleaser/goreleaser/releases/download/v2.6.1/goreleaser_Linux_x86_64.tar.gz | sudo tar -xz -C /usr/local/bin goreleaser
            goreleaser --version

      - run:
          name: Run GoReleaser (main release)
          command: |
            source ~/.bunenv
            goreleaser release --clean

      - run:
          name: Wait for GitHub to process release
          command: sleep 15

      - run:
          name: Generate and publish Nix package
          command: |
            source ~/.bunenv
            # Run GoReleaser again with Nix-only config
            # This can now fetch from GitHub URLs to calculate proper hashes
            goreleaser release --config .goreleaser.nix.yaml

      - run:
          name: Add flake.nix to NUR
          command: |
            # Clone NUR packages repository
            git clone git@github.com:z00b/nur-packages.git /tmp/nur-packages
            cd /tmp/nur-packages

            # Configure git
            git config user.name "z00b Bot"
            git config user.email "rob@zuber.net"

            # Copy flake.nix if it doesn't exist
            if [ ! -f flake.nix ]; then
              cp ~/project/flake.nix .
              git add flake.nix
              git commit -m "Add flake.nix for Nix Flakes support" || echo "No changes"
              git push https://${GITHUB_TOKEN}@github.com/z00b/nur-packages.git main
            fi

workflows:
  version: 2
  release:
    jobs:
      - release:
          context: z00b-releaser
          # Only run on tag pushes
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
