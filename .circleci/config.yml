version: 2.1

orbs:
  flox: flox/orb@1.0.0

jobs:
  release:
    docker:
      # Use an image with both Bun and GoReleaser
      - image: cimg/go:1.26.0

    resource_class: medium

    steps:
      - checkout

      - run:
          name: Fetch all tags
          command: |
            git fetch --force --tags
            git fetch --force --prune --tags

      - run:
          name: Install Bun
          command: |
            curl -fsSL https://bun.sh/install | bash
            echo 'export BUN_INSTALL="$HOME/.bun"' > ~/.bunenv
            echo 'export PATH="$BUN_INSTALL/bin:$PATH"' >> ~/.bunenv
            source ~/.bunenv

      - run:
          name: Verify Bun installation
          command: |
            source ~/.bunenv
            bun --version

      - run:
          name: Install dependencies
          command: |
            source ~/.bunenv
            bun install

      - flox/install

      - run: rm -f flox.*.deb

      - run:
          name: Install GoReleaser
          command: |
            # Download and install GoReleaser
            curl -sL https://github.com/goreleaser/goreleaser/releases/download/v2.6.1/goreleaser_Linux_x86_64.tar.gz | sudo tar -xz -C /usr/local/bin goreleaser
            goreleaser --version

      - run:
          name: Run GoReleaser
          command: |
            source ~/.bunenv
            goreleaser release --clean

      - run:
          name: Publish Nix package to NUR
          command: |
            # Clone NUR packages repository
            git clone git@github.com:z00b/nur-packages.git /tmp/nur-packages
            cd /tmp/nur-packages

            # Configure git
            git config user.name "z00b Bot"
            git config user.email "rob@zuber.net"

            # Create package directory
            mkdir -p pkgs/hellbun

            # Copy the template generated by GoReleaser
            cp ~/project/dist/nix/pkgs/hellbun/default.nix pkgs/hellbun/

            # Calculate proper hashes from local archives
            echo "Calculating SHA256 hashes from local archives..."
            for platform in "Linux_x86_64:x86_64-linux" "Linux_arm64:aarch64-linux" "Darwin_x86_64:x86_64-darwin" "Darwin_arm64:aarch64-darwin"; do
              archive=$(echo $platform | cut -d: -f1)
              nixname=$(echo $platform | cut -d: -f2)
              archive_path="~/project/dist/hello-bun_${archive}.tar.gz"
              echo "Hashing $archive_path..."
              sha=$(nix-hash --type sha256 --flat --base32 "$archive_path")
              # Update the hash in default.nix for this platform
              sed -i "s|${nixname} = \"[^\"]*\"|${nixname} = \"${sha}\"|g" pkgs/hellbun/default.nix
            done

            # Update version and URLs to use correct tag
            sed -i "s|version = \"[^\"]*\"|version = \"${CIRCLE_TAG#v}\"|g" pkgs/hellbun/default.nix
            sed -i "s|/v[0-9.]*-next/|/${CIRCLE_TAG}/|g" pkgs/hellbun/default.nix
            sed -i "s|/v[0-9.][0-9.]*[0-9]/|/${CIRCLE_TAG}/|g" pkgs/hellbun/default.nix

            # Copy flake.nix if it doesn't exist
            if [ ! -f flake.nix ]; then
              cp ~/project/flake.nix .
              git add flake.nix
            fi

            # Commit and push
            git add pkgs/hellbun/default.nix
            git commit -m "Update hellbun to ${CIRCLE_TAG}" || echo "No changes to commit"
            git push https://${GITHUB_TOKEN}@github.com/z00b/nur-packages.git main

workflows:
  version: 2
  release:
    jobs:
      - release:
          context: z00b-releaser
          # Only run on tag pushes
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
